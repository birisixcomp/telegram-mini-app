<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veri Terminali</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0,255,180,0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(0,140,255,0.08), transparent 30%),
        #050505;
      color: white;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      animation: gridMove 14s linear infinite;
    }

    .app {
      padding: 20px;
      padding-bottom: 115px;
      position: relative;
      z-index: 2;
    }

    .top {
      background: rgba(17,17,17,0.88);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 0 30px rgba(0,255,180,0.04);
    }

    .top h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .market {
      display: flex;
      justify-content: space-between;
      background: rgba(21,21,21,0.78);
      padding: 16px 10px;
      border-radius: 18px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow:
        0 0 20px rgba(0,255,180,0.05),
        0 0 40px rgba(0,140,255,0.05);
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .market::before,
    .stat-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -80%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shine 4s infinite;
    }

    .box {
      text-align: center;
      width: 33%;
      position: relative;
      z-index: 2;
    }

    .box small {
      color: #8b8b8b;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .box strong {
      display: block;
      font-size: 19px;
      margin-top: 6px;
      font-weight: 800;
      text-shadow: 0 0 15px rgba(255,255,255,0.15);
    }

    .green {
      color: #00e0a4;
      animation: pulse 2s infinite;
      font-weight: 500;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(17,17,17,0.88);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 22px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 30px rgba(0,255,180,0.05);
      position: relative;
      overflow: hidden;
    }

    .stat-title {
      color: #888;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
      letter-spacing: 0.4px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      color: white;
      position: relative;
      z-index: 2;
      text-shadow: 0 0 15px rgba(255,255,255,0.15);
    }

    .live-signal, .card {
      background: rgba(17,17,17,0.86);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(0,224,164,0.05);
      backdrop-filter: blur(20px);
    }

    .live-signal {
      display: none;
      background: rgba(0,200,150,0.08);
      border: 1px solid rgba(0,224,164,0.25);
      animation: signalGlow 2s infinite;
    }

    .live-signal-label {
      color: #00e0a4;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .live-signal h3, .card h3 {
      margin: 0 0 10px 0;
      font-size: 21px;
    }

    .live-signal p, .card p {
      color: #ccc;
      line-height: 1.5;
      margin: 0;
      white-space: pre-line;
    }

    .live-signal small, .card small {
      display: block;
      color: #777;
      margin-top: 12px;
    }

    .ceiling-card {
      display: none;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #0f2b1f, #07160f);
      border: 1px solid rgba(0,255,170,0.25);
      border-radius: 22px;
      padding: 22px;
      position: relative;
      overflow: hidden;
      animation: ceilingGlow 2s infinite;
    }

    .ceiling-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,255,170,0.08), transparent);
      transform: translateX(-100%);
      animation: ceilingShine 3s infinite;
    }

    .rocket-bg {
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 90px;
      opacity: 0.08;
      animation: rocketFloat 2.5s infinite ease-in-out;
    }

    .ceiling-label {
      color: #00ffb3;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
    }

    .ceiling-card h2 {
      margin: 0;
      font-size: 34px;
      color: white;
      text-shadow: 0 0 18px rgba(0,255,180,0.25);
      position: relative;
      z-index: 2;
    }

    .ceiling-potential {
      margin-top: 8px;
      color: #00ffb3;
      font-size: 24px;
      font-weight: 800;
      position: relative;
      z-index: 2;
    }

    .ceiling-note {
      margin-top: 14px;
      color: #ccc;
      line-height: 1.6;
      position: relative;
      z-index: 2;
      white-space: pre-line;
    }

    .page-title {
      margin: 0 0 18px 0;
      font-size: 24px;
      font-weight: 800;
    }

    .empty-state {
      text-align: center;
      margin-top: 80px;
      color: #777;
    }

    .empty-state .star {
      font-size: 62px;
      color: #222;
      animation: floatStar 3s ease-in-out infinite;
    }

    .bottom {
      position: fixed;
      bottom: 15px;
      left: 15px;
      right: 15px;
      background: rgba(9,9,9,0.82);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 25px;
      display: flex;
      justify-content: space-around;
      padding: 14px 5px;
      backdrop-filter: blur(25px);
      box-shadow: 0 0 20px rgba(255,255,255,0.03);
      z-index: 10;
    }

    .nav {
      color: #777;
      font-size: 12px;
      text-align: center;
      width: 25%;
      transition: 0.3s;
      cursor: pointer;
      user-select: none;
    }

    .nav.active {
      color: white;
      font-weight: 800;
      text-shadow: 0 0 12px rgba(255,255,255,0.18);
    }

    .nav:hover {
      color: #55e0e0;
      transform: translateY(-2px);
    }

    .page {
      display: none;
      animation: pageFade 0.25s ease-in-out;
    }

    .page.active-page {
      display: block;
    }

    @keyframes pulse {
      0% { opacity: 0.55; }
      50% { opacity: 1; }
      100% { opacity: 0.55; }
    }

    @keyframes shine {
      0% { left: -80%; }
      55% { left: 120%; }
      100% { left: 120%; }
    }

    @keyframes floatStar {
      0% { transform: translateY(0); opacity: 0.45; }
      50% { transform: translateY(-8px); opacity: 0.8; }
      100% { transform: translateY(0); opacity: 0.45; }
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 40px 40px; }
    }

    @keyframes signalGlow {
      0% { box-shadow: 0 0 20px rgba(0,224,164,0.06); }
      50% { box-shadow: 0 0 45px rgba(0,224,164,0.16); }
      100% { box-shadow: 0 0 20px rgba(0,224,164,0.06); }
    }

    @keyframes ceilingGlow {
      0% { box-shadow: 0 0 18px rgba(0,255,170,0.08); }
      50% { box-shadow: 0 0 45px rgba(0,255,170,0.25); }
      100% { box-shadow: 0 0 18px rgba(0,255,170,0.08); }
    }

    @keyframes ceilingShine {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
      100% { transform: translateX(100%); }
    }

    @keyframes rocketFloat {
      0% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-8px) rotate(4deg); }
      100% { transform: translateY(0) rotate(-8deg); }
    }

    @keyframes pageFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <h2>Merhaba Dostum! 🌤️</h2>
    </div>

    <div id="homePage" class="page active-page">
      <div class="market">
        <div class="box">
          <small>BİST 100</small>
          <strong>13.808,2</strong>
          <span class="green">+4.89%</span>
        </div>

        <div class="box">
          <small>BİST 30</small>
          <strong>15.791,1</strong>
          <span class="green">+4.91%</span>
        </div>

        <div class="box">
          <small>VİOP</small>
          <strong>16.115</strong>
          <span class="green">+5.97%</span>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-title">👥 GÜNCEL VIP ÜYE SAYISI</div>
          <div class="stat-value" id="vipCount">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">💰 TOPLAM HACİM</div>
          <div class="stat-value" id="totalVolume">0 ₺</div>
        </div>
      </div>

      <div id="ceilingCandidateBox" class="ceiling-card">
        <div class="rocket-bg">🚀</div>
        <div class="ceiling-label">🚀 TAVAN ADAYI</div>
        <h2 id="ceilingStock"></h2>
        <div id="ceilingPotential" class="ceiling-potential"></div>
        <p id="ceilingNote" class="ceiling-note"></p>
        <small id="ceilingTime" style="color:#666;position:relative;z-index:2;"></small>
      </div>

      <div id="liveSignalBox" class="live-signal">
        <div class="live-signal-label">📡 CANLI SİNYAL</div>
        <h3 id="liveSignalTitle"></h3>
        <p id="liveSignalText"></p>
        <small id="liveSignalTime"></small>
      </div>
    </div>

    <div id="newsPage" class="page">
      <h2 class="page-title">📰 Haberler</h2>
      <div id="newsContainer"></div>
    </div>

    <div id="specialPage" class="page">
      <h2 class="page-title">⭐ Özel Liste</h2>
      <div id="specialContainer"></div>
    </div>

    <div id="profitPage" class="page">
      <h2 class="page-title">💰 Bugünün Karı</h2>
      <div id="todayProfitBox" class="card" style="display:none;">
        <h2 id="profitTitle" style="margin:0;"></h2>
        <div id="profitRate" style="font-size:42px;font-weight:800;color:#00e0a4;margin:14px 0;"></div>
        <p id="profitText"></p>
        <small id="profitTime"></small>
      </div>
      <div id="profitEmpty" class="empty-state">
        <div class="star">☆</div>
        <h3>Bugünün karı henüz girilmedi</h3>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="nav active" onclick="showPage('home')" id="nav-home">🏠<br>Anasayfa</div>
    <div class="nav" onclick="showPage('news')" id="nav-news">📰<br>Haberler</div>
    <div class="nav" onclick="showPage('special')" id="nav-special">⭐<br>Özel Liste</div>
    <div class="nav" onclick="showPage('profit')" id="nav-profit">💰<br>Bugünün Karı</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const firebaseConfig = {
      apiKey: "AIzaSyALt8zDibjQy07ImqA3EepJbnIiQa1HmDk",
      authDomain: "halkaarz-terminal.firebaseapp.com",
      databaseURL: "https://halkaarz-terminal-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "halkaarz-terminal",
      storageBucket: "halkaarz-terminal.firebasestorage.app",
      messagingSenderId: "703690716408",
      appId: "1:703690716408:web:69c93387687726f0aab70d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const user = tg.initDataUnsafe.user;

    if (!user) {
      document.body.innerHTML = `
        <div style="height:100vh;display:flex;justify-content:center;align-items:center;background:#050505;color:white;font-size:22px;font-family:Arial;text-align:center;padding:30px;">
          Telegram içinden aç.
        </div>
      `;
    } else {
      const userId = String(user.id);

      db.ref("vipUsers/" + userId).once("value")
        .then(snapshot => {
          if (!snapshot.exists()) {
            document.body.innerHTML = `
              <div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#050505;color:white;font-family:Arial;text-align:center;padding:30px;">
                <h1 style="font-size:34px;">⛔ VIP Gerekli</h1>
                <p style="color:#999;max-width:400px;line-height:1.6;margin-top:10px;">
                  Bu terminal sadece VIP üyeler içindir.
                </p>
                <a href="https://t.me/senin_grubun" style="margin-top:25px;background:#00c896;color:black;text-decoration:none;padding:15px 30px;border-radius:14px;font-weight:bold;">
                  VIP Satın Al
                </a>
              </div>
            `;
            return;
          }

          startTerminal();
          listenVipStats();
          listenLiveSignal();
          listenCeilingCandidate();
          listenNews();
          listenSpecialList();
          listenTodayProfit();
        });
    }

    function showPage(page) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
      document.querySelectorAll(".nav").forEach(n => n.classList.remove("active"));

      document.getElementById(page + "Page").classList.add("active-page");
      document.getElementById("nav-" + page).classList.add("active");
    }

    function startTerminal() {
      async function getMarketData() {
        try {
          const url = "https://query1.finance.yahoo.com/v8/finance/chart/XU100.IS";
          const response = await fetch(url);
          const data = await response.json();

          const result = data.chart.result[0];
          const meta = result.meta;

          const price = meta.regularMarketPrice;
          const previousClose = meta.previousClose;
          const change = price - previousClose;
          const percent = (change / previousClose) * 100;

          document.querySelector(".box:nth-child(1) strong").innerText =
            price.toLocaleString("tr-TR");

          document.querySelector(".box:nth-child(1) span").innerText =
            (percent >= 0 ? "+" : "") + percent.toFixed(2) + "%";

        } catch (error) {
          console.log(error);
        }
      }

      getMarketData();
      setInterval(getMarketData, 60000);
    }

    function listenVipStats() {
      db.ref("terminalStats").on("value", snapshot => {
        const data = snapshot.val();

        if (!data) {
          document.getElementById("vipCount").innerText = "0";
          document.getElementById("totalVolume").innerText = "0 ₺";
          return;
        }

        document.getElementById("vipCount").innerText = data.vipCount || "0";
        document.getElementById("totalVolume").innerText = data.volume || "0 ₺";
      });
    }

    function listenLiveSignal() {
      db.ref("liveSignal").on("value", snapshot => {
        const signal = snapshot.val();

        const box = document.getElementById("liveSignalBox");
        const title = document.getElementById("liveSignalTitle");
        const text = document.getElementById("liveSignalText");
        const time = document.getElementById("liveSignalTime");

        if (!signal || !signal.active) {
          box.style.display = "none";
          return;
        }

        title.innerText = signal.title || "";
        text.innerText = signal.text || "";
        time.innerText = signal.time || "";
        box.style.display = "block";
      });
    }

    function listenCeilingCandidate() {
      db.ref("ceilingCandidate").on("value", snapshot => {
        const data = snapshot.val();
        const box = document.getElementById("ceilingCandidateBox");

        if (!data || !data.active) {
          box.style.display = "none";
          return;
        }

        document.getElementById("ceilingStock").innerText = data.stock || "";
        document.getElementById("ceilingPotential").innerText = data.potential || "";
        document.getElementById("ceilingNote").innerText = data.note || "";
        document.getElementById("ceilingTime").innerText = data.time || "";

        box.style.display = "block";
      });
    }

    function listenNews() {
      db.ref("news").on("value", snapshot => {
        const data = snapshot.val() || {};
        const container = document.getElementById("newsContainer");
        container.innerHTML = "";

        const entries = Object.values(data).reverse();

        if (!entries.length) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="star">☆</div>
              <h3>Henüz haber yok</h3>
            </div>
          `;
          return;
        }

        entries.forEach(news => {
          container.innerHTML += `
            <div class="card">
              <h3>${news.title || ""}</h3>
              <p>${news.text || ""}</p>
              <small>${news.time || ""}</small>
            </div>
          `;
        });
      });
    }

    function listenSpecialList() {
      db.ref("specialList").on("value", snapshot => {
        const data = snapshot.val() || {};
        const container = document.getElementById("specialContainer");
        container.innerHTML = "";

        const entries = Object.values(data).reverse();

        if (!entries.length) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="star">☆</div>
              <h3>Özel liste boş</h3>
            </div>
          `;
          return;
        }

        entries.forEach(item => {
          container.innerHTML += `
            <div class="card">
              <h3 style="color:#00e0a4;">⭐ ${item.stock || ""}</h3>
              <p>${item.note || ""}</p>
              <small>${item.time || ""}</small>
            </div>
          `;
        });
      });
    }

    function listenTodayProfit() {
      db.ref("todayProfit").on("value", snapshot => {
        const data = snapshot.val();
        const box = document.getElementById("todayProfitBox");
        const empty = document.getElementById("profitEmpty");

        if (!data || !data.active) {
          box.style.display = "none";
          empty.style.display = "block";
          return;
        }

        document.getElementById("profitTitle").innerText = data.title || "";
        document.getElementById("profitRate").innerText = data.rate || "";
        document.getElementById("profitText").innerText = data.text || "";
        document.getElementById("profitTime").innerText = data.time || "";

        box.style.display = "block";
        empty.style.display = "none";
      });
    }
  </script>
</body>
</html>
