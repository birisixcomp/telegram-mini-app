<!-- ANA SAYFA -->
<div id="homePage">

  <div class="market">
    <div class="box">
      <small>BİST 100</small>
      <strong>13.808,2</strong>
      <span class="green">+4.89%</span>
    </div>

    <div class="box">
      <small>BİST 30</small>
      <strong>15.791,1</strong>
      <span class="green">+4.91%</span>
    </div>

    <div class="box">
      <small>VİOP</small>
      <strong>16.115</strong>
      <span class="green">+5.97%</span>
    </div>
  </div>

  <!-- TAVAN ADAYI -->
  <div id="ceilingCandidateBox" style="
    display:none;
    margin-bottom:20px;
    background:linear-gradient(135deg,#0f2b1f,#07160f);
    border:1px solid rgba(0,255,170,0.25);
    border-radius:22px;
    padding:22px;
    position:relative;
    overflow:hidden;
    animation:ceilingGlow 2s infinite;
  ">

    <div style="
      position:absolute;
      top:-20px;
      right:-20px;
      font-size:90px;
      opacity:0.08;
    ">
      🚀
    </div>

    <div style="
      color:#00ffb3;
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:1px;
    ">
      🚀 TAVAN ADAYI
    </div>

    <h2 id="ceilingStock"
        style="
          margin:0;
          font-size:34px;
          color:white;
          text-shadow:0 0 18px rgba(0,255,180,0.25);
        ">
    </h2>

    <div id="ceilingPotential"
         style="
           margin-top:8px;
           color:#00ffb3;
           font-size:24px;
           font-weight:bold;
         ">
    </div>

    <p id="ceilingNote"
       style="
         margin-top:14px;
         color:#ccc;
         line-height:1.6;
       ">
    </p>

    <small id="ceilingTime"
           style="
             display:block;
             margin-top:10px;
             color:#666;
           ">
    </small>

  </div>

  <!-- CANLI SİNYAL -->
  <div id="liveSignalBox" class="live-signal">
    <div class="live-signal-label">📡 CANLI SİNYAL</div>
    <h3 id="liveSignalTitle"></h3>
    <p id="liveSignalText"></p>
    <small id="liveSignalTime"></small>
  </div>

</div>

<!-- HABERLER -->
<div id="newsPage" style="display:none;">

  <h2 style="margin-bottom:18px;">📰 Haberler</h2>

  <div id="newsContainer"></div>

</div>

<!-- ÖZEL LİSTE -->
<div id="specialPage" style="display:none;">

  <h2 style="margin-bottom:18px;">⭐ Özel Liste</h2>

  <div id="specialContainer"></div>

</div>

<!-- BUGÜNÜN KARI -->
<div id="profitPage" style="display:none;">

  <h2 style="margin-bottom:18px;">💰 Bugünün Karı</h2>

  <div id="todayProfitBox"
       style="
         display:none;
         background:rgba(0,200,150,0.08);
         border:1px solid rgba(0,224,164,0.25);
         border-radius:20px;
         padding:22px;
       ">

    <h2 id="profitTitle"></h2>

    <div id="profitRate"
         style="
           font-size:42px;
           font-weight:bold;
           color:#00e0a4;
           margin:14px 0;
         ">
    </div>

    <p id="profitText"
       style="
         color:#ccc;
         line-height:1.6;
       ">
    </p>

    <small id="profitTime"
           style="
             color:#777;
           ">
    </small>

  </div>

</div>

<!-- ALT MENÜ -->
<div class="bottom">

  <div class="nav active"
       onclick="showPage('home')"
       id="nav-home">
       🏠<br>Anasayfa
  </div>

  <div class="nav"
       onclick="showPage('news')"
       id="nav-news">
       📰<br>Haberler
  </div>

  <div class="nav"
       onclick="showPage('special')"
       id="nav-special">
       ⭐<br>Özel Liste
  </div>

  <div class="nav"
       onclick="showPage('profit')"
       id="nav-profit">
       💰<br>Bugünün Karı
  </div>

</div>

<script>

function showPage(page) {

  document.getElementById("homePage").style.display = "none";
  document.getElementById("newsPage").style.display = "none";
  document.getElementById("specialPage").style.display = "none";
  document.getElementById("profitPage").style.display = "none";

  document.querySelectorAll(".nav").forEach(nav => {
    nav.classList.remove("active");
  });

  if(page === "home") {
    document.getElementById("homePage").style.display = "block";
    document.getElementById("nav-home").classList.add("active");
  }

  if(page === "news") {
    document.getElementById("newsPage").style.display = "block";
    document.getElementById("nav-news").classList.add("active");
  }

  if(page === "special") {
    document.getElementById("specialPage").style.display = "block";
    document.getElementById("nav-special").classList.add("active");
  }

  if(page === "profit") {
    document.getElementById("profitPage").style.display = "block";
    document.getElementById("nav-profit").classList.add("active");
  }

}

/* TAVAN ADAYI */

db.ref("ceilingCandidate").on("value", snapshot => {

  const data = snapshot.val();

  const box = document.getElementById("ceilingCandidateBox");

  if(!data || !data.active) {
    box.style.display = "none";
    return;
  }

  document.getElementById("ceilingStock").innerText = data.stock || "";
  document.getElementById("ceilingPotential").innerText = data.potential || "";
  document.getElementById("ceilingNote").innerText = data.note || "";
  document.getElementById("ceilingTime").innerText = data.time || "";

  box.style.display = "block";

});

/* HABERLER */

db.ref("news").on("value", snapshot => {

  const data = snapshot.val() || {};

  const container = document.getElementById("newsContainer");

  container.innerHTML = "";

  Object.values(data).reverse().forEach(news => {

    container.innerHTML += `
      <div style="
        background:#111;
        border:1px solid #222;
        border-radius:18px;
        padding:18px;
        margin-bottom:16px;
      ">

        <h3 style="margin-top:0;">${news.title}</h3>

        <p style="
          color:#bbb;
          line-height:1.6;
        ">
          ${news.text}
        </p>

        <small style="color:#666;">
          ${news.time}
        </small>

      </div>
    `;

  });

});

/* ÖZEL LİSTE */

db.ref("specialList").on("value", snapshot => {

  const data = snapshot.val() || {};

  const container = document.getElementById("specialContainer");

  container.innerHTML = "";

  Object.values(data).reverse().forEach(item => {

    container.innerHTML += `
      <div style="
        background:#111;
        border:1px solid #222;
        border-radius:18px;
        padding:18px;
        margin-bottom:16px;
      ">

        <h2 style="
          margin-top:0;
          color:#00e0a4;
        ">
          ⭐ ${item.stock}
        </h2>

        <p style="
          color:#bbb;
          line-height:1.6;
        ">
          ${item.note}
        </p>

        <small style="color:#666;">
          ${item.time}
        </small>

      </div>
    `;

  });

});

/* BUGÜNÜN KARI */

db.ref("todayProfit").on("value", snapshot => {

  const data = snapshot.val();

  const box = document.getElementById("todayProfitBox");

  if(!data || !data.active) {
    box.style.display = "none";
    return;
  }

  document.getElementById("profitTitle").innerText = data.title || "";
  document.getElementById("profitRate").innerText = data.rate || "";
  document.getElementById("profitText").innerText = data.text || "";
  document.getElementById("profitTime").innerText = data.time || "";

  box.style.display = "block";

});

</script>

<style>

@keyframes ceilingGlow {

  0% {
    box-shadow:0 0 18px rgba(0,255,170,0.08);
  }

  50% {
    box-shadow:0 0 45px rgba(0,255,170,0.25);
  }

  100% {
    box-shadow:0 0 18px rgba(0,255,170,0.08);
  }

}

</style>
