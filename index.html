<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veri Terminali</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0,255,180,0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(0,140,255,0.08), transparent 30%),
        #050505;
      color: white;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      animation: gridMove 14s linear infinite;
    }

    .app {
      padding: 20px;
      padding-bottom: 110px;
      position: relative;
      z-index: 2;
    }

    .top {
      background: rgba(17,17,17,0.88);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 0 30px rgba(0,255,180,0.04);
    }

    .top h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .market {
      display: flex;
      justify-content: space-between;
      background: rgba(21,21,21,0.78);
      padding: 16px 10px;
      border-radius: 18px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow:
        0 0 20px rgba(0,255,180,0.05),
        0 0 40px rgba(0,140,255,0.05);
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .market::before {
      content: "";
      position: absolute;
      top: 0;
      left: -80%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shine 4s infinite;
    }

    .market:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 30px rgba(0,255,180,0.12),
        0 0 60px rgba(0,140,255,0.12);
    }

    .box {
      text-align: center;
      width: 33%;
      position: relative;
      z-index: 2;
    }

    .box small {
      color: #8b8b8b;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .box strong {
      display: block;
      font-size: 19px;
      margin-top: 6px;
      font-weight: 800;
      text-shadow: 0 0 15px rgba(255,255,255,0.15);
    }

    .green {
      color: #00e0a4;
      animation: pulse 2s infinite;
      font-weight: 500;
    }

    .empty {
      text-align: center;
      margin-top: 110px;
      color: #777;
    }

    .empty .star {
      font-size: 62px;
      color: #222;
      animation: floatStar 3s ease-in-out infinite;
    }

    .empty h3 {
      color: #888;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .empty p {
      color: #666;
      line-height: 1.5;
    }

    button {
      background: rgba(17,17,17,0.9);
      border: 1px solid rgba(85,224,224,0.28);
      color: #55e0e0;
      padding: 14px 25px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(85,224,224,0.06);
    }

    button:hover {
      transform: scale(1.04);
      box-shadow: 0 0 30px rgba(85,224,224,0.18);
    }

    .bottom {
      position: fixed;
      bottom: 15px;
      left: 15px;
      right: 15px;
      background: rgba(9,9,9,0.82);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 25px;
      display: flex;
      justify-content: space-around;
      padding: 14px 5px;
      backdrop-filter: blur(25px);
      box-shadow: 0 0 20px rgba(255,255,255,0.03);
      z-index: 10;
    }

    .nav {
      color: #777;
      font-size: 13px;
      text-align: center;
      width: 20%;
      transition: 0.3s;
    }

    .nav.active {
      color: white;
      font-weight: 800;
      text-shadow: 0 0 12px rgba(255,255,255,0.18);
    }

    .nav:hover {
      color: #55e0e0;
      transform: translateY(-2px);
    }

    @keyframes pulse {
      0% { opacity: 0.55; }
      50% { opacity: 1; }
      100% { opacity: 0.55; }
    }

    @keyframes shine {
      0% { left: -80%; }
      55% { left: 120%; }
      100% { left: 120%; }
    }

    @keyframes floatStar {
      0% { transform: translateY(0); opacity: 0.45; }
      50% { transform: translateY(-8px); opacity: 0.8; }
      100% { transform: translateY(0); opacity: 0.45; }
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 40px 40px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <h2>Merhaba Dostum! 🌤️</h2>
    </div>

    <div class="market">
      <div class="box">
        <small>BİST 100</small>
        <strong>13.808,2</strong>
        <span class="green">+4.89%</span>
      </div>

      <div class="box">
        <small>BİST 30</small>
        <strong>15.791,1</strong>
        <span class="green">+4.91%</span>
      </div>

      <div class="box">
        <small>VİOP</small>
        <strong>16.115</strong>
        <span class="green">+5.97%</span>
      </div>
    </div>

    <div class="empty">
      <div class="star">☆</div>
      <h3>Favoriler listesi boş</h3>
      <p>Takip etmek istediğin hisseleri<br>ekleyerek başla</p>
      <button>+ Hisse Ekle</button>
    </div>
  </div>

  <div class="bottom">
    <div class="nav active">🏠<br>Anasayfa</div>
    <div class="nav">🏢<br>Kurumsal</div>
    <div class="nav">•••<br>Diğer</div>
    <div class="nav">◔<br>Portföy</div>
    <div class="nav">▣<br>Fon</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const VIP_USERS = [
      7724019785
    ];

    const user = window.Telegram.WebApp.initDataUnsafe.user;

    if (!user || !VIP_USERS.includes(user.id)) {
      document.body.innerHTML = `
        <div style="
          min-height:100vh;
          display:flex;
          align-items:center;
          justify-content:center;
          background:#050505;
          color:white;
          font-family:Inter,Arial;
          text-align:center;
          padding:25px;
        ">
          <div style="
            max-width:420px;
            background:rgba(17,17,17,0.9);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:24px;
            padding:30px;
            box-shadow:0 0 40px rgba(0,255,180,0.08);
          ">
            <h2>🔒 VIP Erişim Gerekli</h2>
            <p style="color:#aaa;line-height:1.6;">
              Bu terminal sadece VIP üyeler için aktiftir.
            </p>
            <p style="color:#55e0e0;font-weight:800;">
              Telegram ID: ${user ? user.id : "Bilinmiyor"}
            </p>
            <p style="color:#777;font-size:13px;">
              Erişim almak için yöneticiyle iletişime geç.
            </p>
          </div>
        </div>
      `;
      throw new Error("VIP erişim yok");
    }

    async function getMarketData() {
      try {
        const url = "https://query1.finance.yahoo.com/v8/finance/chart/XU100.IS";
        const response = await fetch(url);
        const data = await response.json();

        const result = data.chart.result[0];
        const meta = result.meta;

        const price = meta.regularMarketPrice;
        const previousClose = meta.previousClose;
        const change = price - previousClose;
        const percent = (change / previousClose) * 100;

        document.querySelector(".box:nth-child(1) strong").innerText =
          price.toLocaleString("tr-TR");

        document.querySelector(".box:nth-child(1) span").innerText =
          (percent >= 0 ? "+" : "") + percent.toFixed(2) + "%";

      } catch (error) {
        console.log("Veri alınamadı:", error);
      }
    }

    getMarketData();
    setInterval(getMarketData, 60000);
  </script>
</body>
</html>
